<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Pro Watermark</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    body { background: #09090B; margin: 0; padding: 0; overflow: hidden; }
    #root { min-height: 100vh; }
    .boot {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #09090B;
    }
    .boot::after {
      content: ""; width: 28px; height: 28px; border-radius: 9999px;
      border: 3px solid rgba(255,176,32,0.18); border-top-color: rgba(255,176,32,0.85);
      animation: boot-spin 0.8s linear infinite;
    }
    @keyframes boot-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div class="boot"></div>
  </div>
</body>
</html>
