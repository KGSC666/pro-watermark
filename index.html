<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Pro Watermark</title>
  <style>
    body { background: #000; margin: 0; padding: 0; overflow: hidden; }
    #root { min-height: 100vh; }
    .boot {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #000;
    }
    .boot::after {
      content: ""; width: 28px; height: 28px; border-radius: 9999px;
      border: 3px solid rgba(255,255,255,0.15); border-top-color: rgba(255,255,255,0.7);
      animation: boot-spin 0.8s linear infinite;
    }
    @keyframes boot-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div class="boot"></div>
  </div>
</body>
</html>
